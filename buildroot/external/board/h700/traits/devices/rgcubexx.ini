[match]
model=Anbernic RG CubeXX
compatible=anbernic,rgcubexx

[device]
device_id=rgcubexx
device_model=Anbernic RG CubeXX
screen_width=720
screen_height=720
screen_rotation=0
wifi_interface=wlan0
bluetooth_adapter=hci0
hdmi_state_path=/sys/class/extcon/hdmi/cable.0/state
battery_capacity_path=/sys/class/power_supply/axp2202-battery
charger_online_path=/sys/class/power_supply/axp20x-usb/online
lid_switch_path=na
rumble_path=/sys/class/power_supply/axp2202-battery/moto
power_led_path=/sys/class/power_supply/axp2202-battery/work_led
axis_lx=2
axis_ly=3
axis_rx=4
axis_ry=5
axis_min=-4096
axis_center=0
axis_max=4096
