name: Lint Minime Configs

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'external/configs/minime_*.defconfig'
      - 'scripts/check-defconfigs.py'
      - '.github/workflows/lint.yml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'external/configs/minime_*.defconfig'
      - 'scripts/check-defconfigs.py'
      - '.github/workflows/lint.yml'
  workflow_dispatch:

jobs:
  defconfig-lint:
    name: Verify common defconfig sections
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check defconfig common sections
        run: |
          python3 scripts/check-defconfigs.py
