name: Build Minime (H700)

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'external/board/h700/**'
      - 'external/configs/minime_h700_defconfig'
      - 'external/board/common/**'
      - 'external/package/**'
      - 'Makefile'
      - 'scripts/**'
      - '.github/workflows/build-h700.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build H700 Firmware
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Verify/Install Dependencies
        run: |
          ./scripts/prepare-linux.sh

      - name: Clean stale Panfrost prebuilt cache
        run: |
          PANFROST_VER="$(grep '^PANFROST_VERSION =' external/package/panfrost/panfrost.mk | cut -d' ' -f3)"
          DL_DIR="${HOME}/.buildroot-dl"
          if [ -d "/buildroot-output" ]; then DL_DIR="/buildroot-output/dl"; fi
          for f in "${DL_DIR}"/panfrost/panfrost-*.tar.gz; do
              [ -e "$f" ] || continue
              case "$f" in *"${PANFROST_VER}".tar.gz) ;; *) rm -f "$f"; echo "Removed stale: $f" ;; esac
          done
          rm -rf /buildroot-output/h700/build/panfrost-*
          rm -rf /buildroot-output/h700/target/usr/lib/panfrost
          rm -f /buildroot-output/h700/target/usr/lib/libEGL.so*
          rm -f /buildroot-output/h700/target/usr/lib/libGLESv2.so*
          rm -f /buildroot-output/h700/target/usr/lib/libgbm.so*
          rm -f /buildroot-output/h700/target/usr/lib/libgallium*
          rm -f /buildroot-output/h700/target/usr/lib/libSPIRV*
          rm -f /buildroot-output/h700/target/usr/lib/libLLVM*
          rm -rf /buildroot-output/h700/target/usr/lib/dri
          rm -rf /buildroot-output/h700/target/usr/lib/gbm
          echo "Panfrost artifacts cleaned for version ${PANFROST_VER}"

      - name: Self-Healing Rebuild Check
        run: |
          python3 scripts/check_rebuild.py --auto-clean

      - name: Build Image
        run: |
          echo "Building image for board: h700"
          make image BOARD=h700
