name: Build Minime (H700)

on:
  push:
    branches:
      - buildroot
    paths:
      - 'external/board/h700/**'
      - 'external/configs/*.config'
      - 'external/configs/*_defconfig'
      - 'external/board/common/**'
      - 'external/package/**'
      - 'external/Config.in'
      - 'support/buildroot-patches/**'
      - 'Makefile'
      - 'scripts/**'
      - '.github/workflows/build-h700.yml'
  workflow_dispatch:
    inputs:
      clean_output:
        description: 'Clean the board output directory before building'
        required: false
        default: false
        type: boolean

jobs:
  build:
    name: Build H700 Firmware
    runs-on: ubuntu-latest
    timeout-minutes: 360
    defaults:
      run:
        working-directory: minime-buildroot
    env:
      USE_PODMAN: '0'
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          path: minime-buildroot

      - name: Restore Buildroot caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildroot-ccache
            ~/.buildroot-dl
          key: minime-h700-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            minime-h700-${{ runner.os }}-${{ github.ref_name }}-
            minime-h700-${{ runner.os }}-

      - name: Prepare cache directories
        run: |
          mkdir -p ~/.buildroot-ccache ~/.buildroot-dl ~/buildroot-output

      - name: Clean output
        if: ${{ inputs.clean_output }}
        run: |
          echo "Cleaning output for board: h700"
          make clean BOARD=h700

      - name: Verify/Install Dependencies
        run: |
          ./scripts/prepare-linux.sh
          ccache --max-size=8G || true

      - name: Build Image
        run: |
          echo "Building image for board: h700"
          make image BOARD=h700

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: minime-h700-${{ github.sha }}
          path: minime-buildroot/out/h700/**
          if-no-files-found: error
          retention-days: 14
