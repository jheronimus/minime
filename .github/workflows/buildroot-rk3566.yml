name: Build Minime (RK3566)

on:
  push:
    branches: [main]
    paths:
      - 'buildroot/external/board/rk3566/**'
      - 'buildroot/external/board/common/**'
      - 'buildroot/external/configs/minime_common.config'
      - 'buildroot/external/configs/minime_rk3566.config'
      - 'buildroot/external/package/**'
      - 'buildroot/Makefile'
      - 'buildroot/scripts/**'
      - '.github/workflows/buildroot-rk3566.yml'
      - 'roms/**'
      - 'drivers/**'
  workflow_dispatch:
    inputs:
      clean_output:
        description: 'Clean the board output directory before building'
        required: false
        default: false
        type: boolean

jobs:
  shared-sources:
    name: Download Shared Sources
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: buildroot
    env:
      USE_PODMAN: '0'
      BOARD: rk3566
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Restore dl cache
        id: cache-dl
        uses: actions/cache@v4
        with:
          path: ~/.buildroot-dl
          key: minime-dl-${{ runner.os }}-${{ hashFiles('buildroot/Makefile', 'buildroot/external/configs/minime_common.config') }}

      - name: Download sources
        if: steps.cache-dl.outputs.cache-hit != 'true'
        run: |
          ./scripts/prepare-linux.sh
          make defconfig BOARD=${{ env.BOARD }}
          make source BOARD=${{ env.BOARD }}

  build:
    name: Build RK3566 Firmware
    needs: shared-sources
    runs-on: ubuntu-latest
    timeout-minutes: 360
    defaults:
      run:
        working-directory: buildroot
    env:
      USE_PODMAN: '0'
      BOARD: rk3566
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Restore dl cache
        uses: actions/cache@v4
        with:
          path: ~/.buildroot-dl
          key: minime-dl-${{ runner.os }}-${{ hashFiles('buildroot/Makefile', 'buildroot/external/configs/minime_common.config') }}

      - name: Restore board ccache
        uses: actions/cache@v4
        with:
          path: ~/.buildroot-ccache
          key: minime-${{ env.BOARD }}-ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            minime-${{ env.BOARD }}-ccache-${{ runner.os }}-

      - name: Prepare cache directories
        run: |
          mkdir -p ~/.buildroot-ccache ~/.buildroot-dl

      - name: Clean output
        if: ${{ inputs.clean_output }}
        run: |
          echo "Cleaning output for board: ${{ env.BOARD }}"
          make clean BOARD=${{ env.BOARD }}

      - name: Verify/Install Dependencies
        run: |
          ./scripts/prepare-linux.sh
          ccache --max-size=8G || true

      - name: Build Image
        run: |
          echo "Building image for board: ${{ env.BOARD }}"
          make image BOARD=${{ env.BOARD }}

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: minime-${{ env.BOARD }}-${{ github.sha }}
          path: buildroot/out/${{ env.BOARD }}/**
          if-no-files-found: error
          retention-days: 14
