name: Build Alpine images

on:
  push:
    branches: [main]
    paths:
      - 'alpine/aports/**'
      - 'alpine/board/**'
      - 'alpine/bootloader/**'
      - 'alpine/configs/**'
      - 'alpine/container/**'
      - 'alpine/scripts/**'
      - 'alpine/Makefile'
      - '.github/workflows/alpine.yml'
  workflow_dispatch:
    inputs:
      build_h700:
        description: 'Build H700'
        required: false
        default: true
        type: boolean
      build_rk3326:
        description: 'Build RK3326'
        required: false
        default: true
        type: boolean
      build_rk3566:
        description: 'Build RK3566'
        required: false
        default: true
        type: boolean
      clean_output:
        description: 'Clean the Alpine output directory before building'
        required: false
        default: false
        type: boolean
      clean_apk_cache:
        description: 'Wipe alpine-repos + alpine-dl + built APK cache before building'
        required: false
        default: false
        type: boolean

jobs:
  compute-matrix:
    name: Compute board matrix
    runs-on: ubuntu-latest
    outputs:
      boards: ${{ steps.set.outputs.boards }}
    steps:
      - name: Select boards
        id: set
        run: |
          boards='["rk3566","rk3326","h700"]'
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            boards=$(echo '[]' \
              | jq -c \
                  --argjson h700   '${{ inputs.build_h700   || true }}' \
                  --argjson rk3326 '${{ inputs.build_rk3326 || true }}' \
                  --argjson rk3566 '${{ inputs.build_rk3566 || true }}' \
                  'if $h700   then . + ["h700"]   else . end |
                   if $rk3326 then . + ["rk3326"] else . end |
                   if $rk3566 then . + ["rk3566"] else . end')
          fi
          echo "boards=${boards}" >> "$GITHUB_OUTPUT"

  build:
    name: Build Alpine ${{ matrix.board }}
    needs: compute-matrix
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        board: ${{ fromJSON(needs.compute-matrix.outputs.boards) }}
    defaults:
      run:
        working-directory: alpine
    env:
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Restore Alpine caches
        uses: actions/cache@v4
        with:
          path: |
            ~/alpine-repos
            ~/alpine-dl
            ~/alpine-ccache
          key: minime-alpine-${{ matrix.board }}-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            minime-alpine-${{ matrix.board }}-${{ runner.os }}-

      # Cache built local APKs (esp. tinykernel, ~7min to rebuild) keyed on
      # every APKBUILD + kernel config + Dockerfile so a signing key change
      # forces a rebuild (stale APKINDEX from a different key causes
      # UNTRUSTED signature errors in abuild).
      - name: Restore built APK cache
        uses: actions/cache@v4
        with:
          path: ~/alpine-output/${{ matrix.board }}/packages
          key: alpine-apks-${{ matrix.board }}-${{ hashFiles('alpine/aports/**', 'alpine/board/**', 'alpine/container/Dockerfile') }}

      # Cache the assembled builder container image so builds don't re-run
      # the Dockerfile apk-add chain on every commit.  Auto-invalidates
      # only when the Dockerfile (or this workflow) actually changes.
      - name: Restore builder image
        id: builder-image
        uses: actions/cache@v4
        with:
          path: ~/alpine-builder.tar
          key: minime-builder-alpine-${{ hashFiles('alpine/container/Dockerfile', '.github/workflows/alpine.yml') }}

      - name: Load builder image
        if: ${{ steps.builder-image.outputs.cache-hit == 'true' }}
        run: docker load -i ~/alpine-builder.tar

      - name: Clean Alpine output
        if: ${{ inputs.clean_output }}
        run: |
          make clean BOARD=${{ matrix.board }}

      - name: Clean APK cache
        if: ${{ inputs.clean_apk_cache }}
        run: |
          rm -rf ~/alpine-repos ~/alpine-dl ~/alpine-ccache \
            ~/alpine-output/${{ matrix.board }}/packages

      - name: Build Alpine builder container & image
        run: |
          make image BOARD=${{ matrix.board }}

      - name: Save builder image
        if: ${{ steps.builder-image.outputs.cache-hit != 'true' && always() }}
        continue-on-error: true
        run: |
          docker image inspect minime-builder-alpine >/dev/null 2>&1 || \
            { echo "builder image missing; nothing to cache"; exit 0; }
          docker save minime-builder-alpine -o ~/alpine-builder.tar

      - name: Run Smoke Test (QEMU Emulation)
        # Board-specific tinykernel builds (rk3326/rk3566/h700) currently
        # hang silently when booted on qemu-system-aarch64 -machine virt
        # because their early-printk paths target real-SoC MMIO, not the
        # virtual platform.  Disabled until the script either boots a
        # multi-platform kernel or is rewritten to exercise rootfs-only
        # checks (no full-QEMU boot).
        if: false
        working-directory: ${{ github.workspace }}
        run: |
          ./scripts/run_smoke_test.sh \
            "${{ matrix.board }}" \
            "$HOME/alpine-output/${{ matrix.board }}/images/Image" \
            "$HOME/alpine-output/${{ matrix.board }}/images/initramfs" \
            "alpine/out/${{ matrix.board }}/minime-alpine-${{ matrix.board }}.img.gz"

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: minime-alpine-${{ matrix.board }}-${{ github.sha }}
          path: alpine/out/${{ matrix.board }}/minime-alpine-${{ matrix.board }}.img.gz
          if-no-files-found: error
          retention-days: 14

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: minime-alpine-${{ matrix.board }}-log-${{ github.sha }}
          path: alpine/logs/alpine-image-${{ matrix.board }}.log
          if-no-files-found: warn
          retention-days: 14
