name: Build Alpine images

on:
  push:
    branches: [main]
    paths:
      - 'alpine/**'
      - 'roms/**'
      - 'drivers/**'
      - '.github/workflows/alpine.yml'
  workflow_dispatch:
    inputs:
      clean_output:
        description: 'Clean the Alpine output directory before building'
        required: false
        default: false
        type: boolean
      clean_apk_cache:
        description: 'Wipe alpine-repos + alpine-dl before building'
        required: false
        default: false
        type: boolean

jobs:
  build:
    name: Build Alpine ${{ matrix.board }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        board: [rk3566, rk3326, h700]
    defaults:
      run:
        working-directory: alpine
    env:
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Restore Alpine caches
        uses: actions/cache@v4
        with:
          path: |
            ~/alpine-repos
            ~/alpine-dl
            ~/alpine-ccache
          key: minime-alpine-${{ matrix.board }}-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            minime-alpine-${{ matrix.board }}-${{ runner.os }}-

      - name: Clean Alpine output
        if: ${{ inputs.clean_output }}
        run: |
          make clean BOARD=${{ matrix.board }}

      - name: Clean APK cache
        if: ${{ inputs.clean_apk_cache }}
        run: |
          rm -rf ~/alpine-repos ~/alpine-dl ~/alpine-ccache

      - name: Build Alpine builder container & image
        run: |
          make image BOARD=${{ matrix.board }}

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: minime-alpine-${{ matrix.board }}-${{ github.sha }}
          path: alpine/out/${{ matrix.board }}/minime-alpine-${{ matrix.board }}.img.gz
          if-no-files-found: error
          retention-days: 14

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: minime-alpine-${{ matrix.board }}-log-${{ github.sha }}
          path: alpine/logs/alpine-image-${{ matrix.board }}.log
          if-no-files-found: warn
          retention-days: 14
