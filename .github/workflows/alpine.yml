name: Build Alpine images

on:
  push:
    branches: [main]
    paths:
      - 'alpine/aports/**'
      - 'alpine/board/**'
      - 'alpine/bootloader/**'
      - 'alpine/configs/**'
      - 'alpine/container/**'
      - 'alpine/scripts/**'
      - 'alpine/Makefile'
      - '.github/workflows/alpine.yml'
  workflow_dispatch:
    inputs:
      build_h700:
        description: 'Build H700'
        required: false
        default: true
        type: boolean
      build_rk3326:
        description: 'Build RK3326'
        required: false
        default: true
        type: boolean
      build_rk3566:
        description: 'Build RK3566'
        required: false
        default: true
        type: boolean


jobs:
  compute-matrix:
    name: Compute board matrix
    runs-on: ubuntu-latest
    outputs:
      boards: ${{ steps.set.outputs.boards }}
    steps:
      - name: Select boards
        id: set
        run: |
          boards='["rk3566","rk3326","h700"]'
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            boards=$(echo '[]' \
              | jq -c \
                  --argjson h700   '${{ inputs.build_h700   || true }}' \
                  --argjson rk3326 '${{ inputs.build_rk3326 || true }}' \
                  --argjson rk3566 '${{ inputs.build_rk3566 || true }}' \
                  'if $h700   then . + ["h700"]   else . end |
                   if $rk3326 then . + ["rk3326"] else . end |
                   if $rk3566 then . + ["rk3566"] else . end')
          fi
          echo "boards=${boards}" >> "$GITHUB_OUTPUT"

  build:
    name: Build Alpine ${{ matrix.board }} (${{ matrix.ui }})
    needs: compute-matrix
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        board: ${{ fromJSON(needs.compute-matrix.outputs.boards) }}
        ui: [minui, allium]
    defaults:
      run:
        working-directory: alpine
    env:
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Alpine builder container & image
        run: |
          make image BOARD=${{ matrix.board }} UI=${{ matrix.ui }}

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: minime-alpine-${{ matrix.board }}-${{ matrix.ui }}-${{ github.sha }}
          path: alpine/out/${{ matrix.board }}/minime-alpine-${{ matrix.board }}.img.xz
          if-no-files-found: error
          retention-days: 14

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: minime-alpine-${{ matrix.board }}-log-${{ github.sha }}
          path: alpine/logs/alpine-image-${{ matrix.board }}.log
          if-no-files-found: warn
          retention-days: 14

      - name: Rename and Upload to Nightly Release
        run: |
          cp out/${{ matrix.board }}/minime-alpine-${{ matrix.board }}.img.xz ../minime-alpine-${{ matrix.board }}-${{ matrix.ui }}.img.xz
          cd ..
          gh release create nightly --title "Nightly Builds" --notes "Automatically updated on each push" || true
          gh release upload nightly minime-alpine-${{ matrix.board }}-${{ matrix.ui }}.img.xz --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
