name: Prebuild LLVM packages

on:
  workflow_dispatch:
    inputs:
      buildroot_version:
        description: 'Buildroot release tag (e.g. 2026.05.1)'
        required: true
        default: '2026.05.1'
      revision:
        description: 'Artifact revision inside the release (e.g. r1, r2)'
        required: true
        default: 'r1'
      flavor:
        description: 'Toolchain flavor'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - bootlin-musl
          - arm-glibc
      manifest_only:
        description: 'Skip build — only push stable.json to llvm-channels (use when build succeeded but push failed)'
        required: false
        default: false
        type: boolean
  push:
    branches: [main]
    paths:
      - 'buildroot/scripts/make-prebuilt-config.sh'
      - 'buildroot/scripts/package-prebuilt-llvm.sh'
      - 'buildroot/scripts/llvm-channel-manifest.py'
      - 'buildroot/Makefile'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        flavor: ${{ (github.event.inputs.flavor && github.event.inputs.flavor != 'all') && fromJSON(format('["{0}"]', github.event.inputs.flavor)) || fromJSON('["bootlin-musl", "arm-glibc"]') }}
    concurrency:
      group: prebuilt-llvm-${{ matrix.flavor }}-${{ inputs.buildroot_version || '2026.05.1' }}-${{ inputs.revision || 'r1' }}
      cancel-in-progress: false
    defaults:
      run:
        working-directory: buildroot
    env:
      BUILDROOT_VERSION: ${{ inputs.buildroot_version || '2026.05.1' }}
      REVISION: ${{ inputs.revision || 'r1' }}
      FLAVOR: ${{ matrix.flavor }}
      OUTPUT_DIR: ${{ github.workspace }}/output
      BUILDROOT_DIR: ${{ github.workspace }}/buildroot-src
      ASSET_DIR: ${{ github.workspace }}/dist
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if build can be skipped
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          release_tag="prebuilt-llvm-${FLAVOR}-${BUILDROOT_VERSION}"
          if [ "${{ inputs.manifest_only }}" = "true" ]; then
            echo "manifest_only requested — skipping build"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            existing=$(gh release view "${release_tag}" --json assets \
              --jq ".assets[].name" 2>/dev/null || true)
            # Chunked releases ship parts.tsv + chunk files; legacy
            # single-asset releases shipped the assembled tarball itself.
            # Treat either as a complete release and skip the rebuild.
            if printf '%s\n' "$existing" | grep -qx "llvm-${REVISION}.tar.xz.parts.tsv" \
              || printf '%s\n' "$existing" | grep -qx "llvm-${REVISION}.tar.xz"; then
              echo "Release assets for ${release_tag}/${REVISION} already exist — skipping build"
              echo "skip=true" >> "$GITHUB_OUTPUT"
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Validate inputs
        if: steps.check.outputs.skip != 'true'
        run: |
          set -euo pipefail
          case "$FLAVOR" in
            bootlin-musl|arm-glibc) ;;
            *) echo "Unsupported flavor: $FLAVOR" >&2; exit 2 ;;
          esac
          case "$REVISION" in
            r[0-9]*) ;;
            *) echo "Revision must look like r1, r2, ...; got: $REVISION" >&2; exit 2 ;;
          esac
          [[ "$BUILDROOT_VERSION" =~ ^[0-9]{4}\.[0-9]{2}(\.[0-9]+)?$ ]] || {
            echo "Invalid Buildroot version: $BUILDROOT_VERSION" >&2
            exit 2
          }

      - name: Install host dependencies
        if: steps.check.outputs.skip != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc build-essential cpio file git jq libncurses-dev locales \
            python3 rsync unzip wget xz-utils ccache

      - name: Restore ccache
        if: steps.check.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.buildroot-ccache
          key: prebuilt-llvm-${{ env.FLAVOR }}-${{ env.BUILDROOT_VERSION }}-${{ env.REVISION }}-${{ github.run_id }}
          restore-keys: |
            prebuilt-llvm-${{ env.FLAVOR }}-${{ env.BUILDROOT_VERSION }}-
            prebuilt-llvm-${{ env.FLAVOR }}-

      - name: Fetch Buildroot release
        if: steps.check.outputs.skip != 'true'
        run: |
          set -euo pipefail
          url="https://buildroot.org/downloads/buildroot-${BUILDROOT_VERSION}.tar.gz"
          wget -O /tmp/buildroot.tar.gz "$url"
          mkdir -p "$BUILDROOT_DIR"
          tar -xzf /tmp/buildroot.tar.gz --strip-components=1 -C "$BUILDROOT_DIR"

      - name: Configure Buildroot package build
        if: steps.check.outputs.skip != 'true'
        run: |
          set -euo pipefail
          mkdir -p "$OUTPUT_DIR"
          scripts/make-prebuilt-config.sh "$FLAVOR" "$OUTPUT_DIR/.config"
          make -C "$BUILDROOT_DIR" O="$OUTPUT_DIR" olddefconfig
          grep -E '^(BR2_TOOLCHAIN_EXTERNAL|BR2_PACKAGE_(LLVM|CLANG|LIBCLC|SPIRV)|BR2_PER_PACKAGE_DIRECTORIES|BR2_TOOLCHAIN_USES_)' "$OUTPUT_DIR/.config" || true


      - name: Build LLVM package set
        if: steps.check.outputs.skip != 'true'
        run: |
          set -euo pipefail
          make -C "$BUILDROOT_DIR" O="$OUTPUT_DIR" \
            BR2_CCACHE_DIR="$HOME/.buildroot-ccache" \
            -j"$(nproc)" \
            host-llvm-cmake host-llvm host-clang host-libclc \
            host-spirv-headers host-spirv-tools host-spirv-llvm-translator \
            llvm clang libclc spirv-headers spirv-tools spirv-llvm-translator

      - name: Package prebuilt LLVM artifact
        if: steps.check.outputs.skip != 'true'
        id: package
        run: |
          set -euo pipefail
          mkdir -p "$ASSET_DIR"
          asset="$ASSET_DIR/llvm-${REVISION}.tar.xz"
          scripts/package-prebuilt-llvm.sh "$BUILDROOT_DIR" "$OUTPUT_DIR" "$FLAVOR" "$BUILDROOT_VERSION" "$REVISION" "$asset"
          sha256="$(cut -d' ' -f1 "${asset%.tar.xz}.sha256")"
          release_tag="prebuilt-llvm-${FLAVOR}-${BUILDROOT_VERSION}"
          url_base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${release_tag}"
          asset_name="llvm-${REVISION}.tar.xz"

          # package-prebuilt-llvm.sh splits the assembled archive into
          # <=1.9 GiB chunks (to fit GitHub's 2 GiB release-asset cap)
          # and writes ${asset}.parts.tsv with one row per chunk.
          # Build the channel stable.json via the shared helper.
          scripts/llvm-channel-manifest.py \
            --output "$ASSET_DIR/stable.json" \
            --sha256 "$sha256" \
            --flavor "$FLAVOR" \
            --buildroot-version "$BUILDROOT_VERSION" \
            --revision "$REVISION" \
            --release-tag "$release_tag" \
            --url-base "$url_base" \
            --asset-name "$asset_name" \
            --parts-tsv "${asset}.parts.tsv"

          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "asset=${asset_name}" >> "$GITHUB_OUTPUT"
          echo "sha256=${sha256}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release assets
        if: steps.check.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.package.outputs.release_tag }}
          name: ${{ steps.package.outputs.release_tag }}
          body: |
            Prebuilt LLVM/Clang package set for Buildroot `${{ env.BUILDROOT_VERSION }}`.

            * Flavor: `${{ env.FLAVOR }}`
            * Revision: `${{ env.REVISION }}`
            * Asset: `${{ steps.package.outputs.asset }}`
            * SHA256: `${{ steps.package.outputs.sha256 }}`

            Assets are immutable. New rebuilds for the same Buildroot/flavor release should upload a new `llvm-rN.tar.xz` asset.
          files: |
            ${{ env.ASSET_DIR }}/llvm-${{ env.REVISION }}.tar.xz.*
            ${{ env.ASSET_DIR }}/llvm-${{ env.REVISION }}.sha256
            ${{ env.ASSET_DIR }}/llvm-${{ env.REVISION }}.manifest.json
          overwrite_files: true

      - name: Update stable channel manifest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # When skipping the build, reconstruct stable.json from the
          # existing release (downloading both the assembled-archive
          # sha256 sidecar and the chunked parts.tsv). The shared helper
          # preserves the legacy single-asset schema when parts.tsv is
          # absent (older releases uploaded before chunking landed).
          if [ "${{ steps.check.outputs.skip }}" = "true" ]; then
            release_tag="prebuilt-llvm-${FLAVOR}-${BUILDROOT_VERSION}"
            url_base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${release_tag}"
            asset_name="llvm-${REVISION}.tar.xz"

            sha256=$(gh release view "${release_tag}" --json assets \
              --jq ".assets[] | select(.name==\"llvm-${REVISION}.sha256\") | .url" \
              | xargs curl -fsSL | cut -d' ' -f1)

            mkdir -p /tmp/dist
            parts_tsv_url=$(gh release view "${release_tag}" --json assets \
              --jq ".assets[] | select(.name==\"${asset_name}.parts.tsv\") | .url" 2>/dev/null || true)
            if [ -n "$parts_tsv_url" ]; then
              curl -fsSL "$parts_tsv_url" -o /tmp/dist/parts.tsv
            else
              : > /tmp/dist/parts.tsv
            fi

            scripts/llvm-channel-manifest.py \
              --output /tmp/dist/stable.json \
              --sha256 "$sha256" \
              --flavor "$FLAVOR" \
              --buildroot-version "$BUILDROOT_VERSION" \
              --revision "$REVISION" \
              --release-tag "$release_tag" \
              --url-base "$url_base" \
              --asset-name "$asset_name" \
              --parts-tsv /tmp/dist/parts.tsv
            cp /tmp/dist/stable.json /tmp/stable.json
          else
            cp "$ASSET_DIR/stable.json" /tmp/stable.json
          fi
          git fetch origin
          if git show-ref --quiet refs/remotes/origin/llvm-channels; then
            git checkout llvm-channels
            git pull origin llvm-channels
          else
            git checkout --orphan llvm-channels
            git rm -rf -- :/
          fi
          channel_dir="channels/${FLAVOR}/${BUILDROOT_VERSION}"
          mkdir -p "$channel_dir"
          cp /tmp/stable.json "$channel_dir/stable.json"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$channel_dir/stable.json"
          if git diff --quiet --cached; then
            echo "Stable channel already points at ${REVISION}."
          else
            git commit -m "Promote ${FLAVOR} ${BUILDROOT_VERSION} ${REVISION}"
            git push origin llvm-channels
          fi
