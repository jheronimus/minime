name: Build Buildroot images

on:
  push:
    branches: [main]
    paths:
      - 'buildroot/external/configs/**'
      - 'buildroot/external/package/**'
      - 'buildroot/external/board/**'
      - 'buildroot/support/**'
      - 'buildroot/container/**'
      - '.github/workflows/buildroot.yml'
  workflow_run:
    workflows: ["Prebuild LLVM packages"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      build_h700:
        description: 'Build H700'
        required: false
        default: true
        type: boolean
      build_rk3326:
        description: 'Build RK3326'
        required: false
        default: true
        type: boolean
      build_rk3566:
        description: 'Build RK3566'
        required: false
        default: true
        type: boolean
      build_bootlin_musl:
        description: 'Build bootlin-musl flavor'
        required: false
        default: true
        type: boolean
      build_arm_glibc:
        description: 'Build arm-glibc flavor'
        required: false
        default: true
        type: boolean
      clean_output:
        description: 'Clean the board output directories before building'
        required: false
        default: false
        type: boolean

jobs:
  compute-matrix:
    name: Compute board matrix
    runs-on: ubuntu-latest
    outputs:
      boards: ${{ steps.set.outputs.boards }}
      flavors: ${{ steps.set.outputs.flavors }}
    steps:
      - name: Select boards and flavors
        id: set
        run: |
          boards='["h700","rk3326","rk3566"]'
          flavors='["bootlin-musl","arm-glibc"]'
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            boards=$(echo '[]' \
              | jq -c \
                  --argjson h700   '${{ inputs.build_h700   || true }}' \
                  --argjson rk3326 '${{ inputs.build_rk3326 || true }}' \
                  --argjson rk3566 '${{ inputs.build_rk3566 || true }}' \
                  'if $h700   then . + ["h700"]   else . end |
                   if $rk3326 then . + ["rk3326"] else . end |
                   if $rk3566 then . + ["rk3566"] else . end')
            flavors=$(echo '[]' \
              | jq -c \
                  --argjson musl  '${{ inputs.build_bootlin_musl || true }}' \
                  --argjson glibc '${{ inputs.build_arm_glibc    || true }}' \
                  'if $musl  then . + ["bootlin-musl"] else . end |
                   if $glibc then . + ["arm-glibc"]    else . end')
          fi
          echo "boards=${boards}"   >> "$GITHUB_OUTPUT"
          echo "flavors=${flavors}" >> "$GITHUB_OUTPUT"

  shared-sources:
    name: Download Shared Sources
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    defaults:
      run:
        working-directory: buildroot
    env:
      USE_PODMAN: '0'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Restore dl cache
        id: cache-dl
        uses: actions/cache@v4
        with:
          path: ~/.buildroot-dl
          key: minime-dl-${{ runner.os }}-${{ hashFiles('buildroot/Makefile', 'buildroot/external/configs/minime_common.config') }}

      - name: Download sources for all boards
        if: steps.cache-dl.outputs.cache-hit != 'true'
        run: |
          ./scripts/prepare-linux.sh
          for board in h700 rk3326 rk3566; do
            echo "Downloading sources for $board..."
            make defconfig BOARD=$board
            make source BOARD=$board
          done

  build:
    name: Build Buildroot ${{ matrix.board }} (${{ matrix.flavor }})
    needs: [compute-matrix, shared-sources]
    runs-on: ubuntu-latest
    timeout-minutes: 360
    defaults:
      run:
        working-directory: buildroot
    strategy:
      fail-fast: false
      matrix:
        board: ${{ fromJSON(needs.compute-matrix.outputs.boards) }}
        flavor: ${{ fromJSON(needs.compute-matrix.outputs.flavors) }}
    env:
      USE_PODMAN: '0'
      BOARD: ${{ matrix.board }}
      FLAVOR: ${{ matrix.flavor }}
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Restore dl cache
        uses: actions/cache@v4
        with:
          path: ~/.buildroot-dl
          key: minime-dl-${{ runner.os }}-${{ hashFiles('buildroot/Makefile', 'buildroot/external/configs/minime_common.config') }}

      - name: Restore board ccache
        uses: actions/cache@v4
        with:
          path: ~/.buildroot-ccache
          key: minime-${{ env.BOARD }}-${{ env.FLAVOR }}-ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            minime-${{ env.BOARD }}-${{ env.FLAVOR }}-ccache-${{ runner.os }}-

      - name: Prepare cache directories
        run: |
          mkdir -p ~/.buildroot-ccache ~/.buildroot-dl

      - name: Clean output
        if: ${{ inputs.clean_output }}
        run: |
          echo "Cleaning output for ${{ env.BOARD }} (${{ env.FLAVOR }})"
          make clean BOARD=${{ env.BOARD }} FLAVOR=${{ env.FLAVOR }}

      - name: Verify/Install Dependencies
        run: |
          ./scripts/prepare-linux.sh
          ccache --max-size=8G || true

      - name: Build Image
        run: |
          echo "Building image for ${{ env.BOARD }} (${{ env.FLAVOR }})"
          make image BOARD=${{ env.BOARD }} FLAVOR=${{ env.FLAVOR }}

      - name: Run Smoke Test (QEMU Emulation)
        run: |
          ./scripts/run_smoke_test.sh \
            "${{ env.BOARD }}" \
            "$HOME/buildroot-output/${{ env.BOARD }}-${{ env.FLAVOR }}/images/Image" \
            "$HOME/buildroot-output/${{ env.BOARD }}-${{ env.FLAVOR }}/images/initramfs" \
            "out/${{ env.BOARD }}-${{ env.FLAVOR }}/minime-${{ env.BOARD }}.img.gz"

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: minime-${{ env.BOARD }}-${{ env.FLAVOR }}-${{ github.sha }}
          path: buildroot/out/${{ env.BOARD }}-${{ env.FLAVOR }}/**
          if-no-files-found: error
          retention-days: 14
