name: Build Minime Buildroot Images

on:
  push:
    branches: [main]
    paths:
      - 'buildroot/**'
      - '!buildroot/external/package/minime-prebuilt-llvm/channels/**'
      - 'roms/**'
      - 'drivers/**'
      - '.github/workflows/buildroot.yml'
  workflow_run:
    workflows: ["Build Prebuilt LLVM Packages"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      clean_output:
        description: 'Clean the board output directories before building'
        required: false
        default: false
        type: boolean

jobs:
  shared-sources:
    name: Download Shared Sources
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    defaults:
      run:
        working-directory: buildroot
    env:
      USE_PODMAN: '0'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Restore dl cache
        id: cache-dl
        uses: actions/cache@v4
        with:
          path: ~/.buildroot-dl
          key: minime-dl-${{ runner.os }}-${{ hashFiles('buildroot/Makefile', 'buildroot/external/configs/minime_common.config') }}

      - name: Download sources for all boards
        if: steps.cache-dl.outputs.cache-hit != 'true'
        run: |
          ./scripts/prepare-linux.sh
          for board in h700 rk3326 rk3566; do
            echo "Downloading sources for $board..."
            make defconfig BOARD=$board
            make source BOARD=$board
          done

  build-h700:
    name: Build Buildroot H700
    needs: shared-sources
    runs-on: ubuntu-latest
    timeout-minutes: 360
    defaults:
      run:
        working-directory: buildroot
    env:
      USE_PODMAN: '0'
      BOARD: h700
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Restore dl cache
        uses: actions/cache@v4
        with:
          path: ~/.buildroot-dl
          key: minime-dl-${{ runner.os }}-${{ hashFiles('buildroot/Makefile', 'buildroot/external/configs/minime_common.config') }}

      - name: Restore board ccache
        uses: actions/cache@v4
        with:
          path: ~/.buildroot-ccache
          key: minime-${{ env.BOARD }}-ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            minime-${{ env.BOARD }}-ccache-${{ runner.os }}-

      - name: Prepare cache directories
        run: |
          mkdir -p ~/.buildroot-ccache ~/.buildroot-dl

      - name: Clean output
        if: ${{ inputs.clean_output }}
        run: |
          echo "Cleaning output for board: ${{ env.BOARD }}"
          make clean BOARD=${{ env.BOARD }}

      - name: Verify/Install Dependencies
        run: |
          ./scripts/prepare-linux.sh
          ccache --max-size=8G || true

      - name: Build Image
        run: |
          echo "Building image for board: ${{ env.BOARD }}"
          make image BOARD=${{ env.BOARD }}

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: minime-${{ env.BOARD }}-${{ github.sha }}
          path: buildroot/out/${{ env.BOARD }}/**
          if-no-files-found: error
          retention-days: 14

  build-rk3326:
    name: Build Buildroot RK3326
    needs: shared-sources
    runs-on: ubuntu-latest
    timeout-minutes: 360
    defaults:
      run:
        working-directory: buildroot
    env:
      USE_PODMAN: '0'
      BOARD: rk3326
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
