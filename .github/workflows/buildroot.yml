name: Build Buildroot images

on:
  push:
    branches: [main]
    paths:
      - 'buildroot/external/configs/**'
      - 'buildroot/external/package/**'
      - 'buildroot/external/board/**'
      - 'buildroot/container/**'
      - 'alpine/board/**'
      - '.github/workflows/buildroot.yml'
  workflow_dispatch:
    inputs:
      build_h700:
        description: 'Build H700 (experimental)'
        required: false
        default: false
        type: boolean
      build_rk3326:
        description: 'Build RK3326'
        required: false
        default: true
        type: boolean
      build_rk3566:
        description: 'Build RK3566'
        required: false
        default: true
        type: boolean
      clean_output:
        description: 'Clean the board output directories before building'
        required: false
        default: false
        type: boolean

jobs:
  compute-matrix:
    name: Compute board matrix
    runs-on: ubuntu-latest
    outputs:
      boards: ${{ steps.set.outputs.boards }}
    steps:
      - name: Select boards
        id: set
        run: |
          boards='["rk3326","rk3566"]'
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            boards=$(echo '[]' \
              | jq -c \
                  --argjson h700   '${{ inputs.build_h700   || false }}' \
                  --argjson rk3326 '${{ inputs.build_rk3326 || true }}' \
                  --argjson rk3566 '${{ inputs.build_rk3566 || true }}' \
                  'if $h700   then . + ["h700"]   else . end |
                   if $rk3326 then . + ["rk3326"] else . end |
                   if $rk3566 then . + ["rk3566"] else . end')
          fi
          echo "boards=${boards}" >> "$GITHUB_OUTPUT"

  shared-sources:
    name: Download Shared Sources
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: buildroot
    env:
      USE_PODMAN: '0'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Restore dl cache
        id: cache-dl
        uses: actions/cache@v4
        with:
          path: ~/.buildroot-dl
          key: minime-dl-${{ runner.os }}-${{ hashFiles('buildroot/Makefile', 'buildroot/external/configs/minime_common.config') }}

      - name: Download sources for all boards
        if: steps.cache-dl.outputs.cache-hit != 'true'
        run: |
          ../scripts/prepare-linux.sh
          for board in rk3326 rk3566; do
            echo "Downloading sources for $board..."
            make defconfig BOARD=$board
            make source BOARD=$board
          done

  build:
    name: Build Buildroot ${{ matrix.board }} (${{ matrix.ui }})
    needs: [compute-matrix, shared-sources]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 360
    defaults:
      run:
        working-directory: buildroot
    strategy:
      fail-fast: false
      matrix:
        board: ${{ fromJSON(needs.compute-matrix.outputs.boards) }}
        ui: [minui, allium]
    env:
      USE_PODMAN: '0'
      BOARD: ${{ matrix.board }}
      UI: ${{ matrix.ui }}
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run uptodate.py (self-healing)
        run: python3 scripts/uptodate/uptodate.py
        working-directory: .

      - name: Restore dl cache
        uses: actions/cache@v4
        with:
          path: ~/.buildroot-dl
          key: minime-dl-${{ runner.os }}-${{ hashFiles('buildroot/Makefile', 'buildroot/external/configs/minime_common.config') }}

      - name: Restore board ccache
        uses: actions/cache@v4
        with:
          path: ~/.buildroot-ccache
          key: minime-${{ env.BOARD }}-ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            minime-${{ env.BOARD }}-ccache-${{ runner.os }}-

      - name: Prepare cache directories
        run: |
          mkdir -p ~/.buildroot-ccache ~/.buildroot-dl

      - name: Clean output
        if: ${{ inputs.clean_output }}
        run: |
          echo "Cleaning output for ${{ env.BOARD }}"
          make clean BOARD=${{ env.BOARD }}

      - name: Verify/Install Dependencies
        run: |
          ../scripts/prepare-linux.sh
          ccache --max-size=8G || true

      - name: Build Image
        run: |
          echo "Building image for ${{ env.BOARD }} (${{ env.UI }})"
          make image BOARD=${{ env.BOARD }} UI=${{ env.UI }}



      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: minime-${{ env.BOARD }}-${{ env.UI }}-${{ github.sha }}
          path: buildroot/out/${{ env.BOARD }}/**
          if-no-files-found: error
          retention-days: 14

      - name: Rename and Upload to Nightly Release
        run: |
          cp out/${{ matrix.board }}/minime-${{ matrix.board }}.img.xz ../minime-buildroot-${{ matrix.board }}-${{ matrix.ui }}.img.xz
          cd ..
          gh release create nightly --title "Nightly Builds" --notes "Automatically updated on each push" || true
          gh release upload nightly minime-buildroot-${{ matrix.board }}-${{ matrix.ui }}.img.xz --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
