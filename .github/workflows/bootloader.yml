name: Build bootloaders

on:
  workflow_dispatch:
    inputs:
      uboot_version:
        description: 'U-Boot version (blank = auto-fetch latest stable)'
        required: false
        default: ''
      boards:
        description: 'Comma-separated boards to rebuild (blank = all: h700,rk3326,rk3566)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  resolve-boards:
    name: Resolve board matrix
    runs-on: ubuntu-latest
    outputs:
      boards: ${{ steps.set.outputs.boards }}
    steps:
      - id: set
        run: |
          if [ -n "${{ inputs.boards }}" ]; then
            boards=$(echo '${{ inputs.boards }}' | tr ',' '\n' | jq -R . | jq -sc .)
          else
            boards='["h700","rk3326","rk3566"]'
          fi
          echo "boards=${boards}" >> "$GITHUB_OUTPUT"

  prebuild:
    name: Rebuild ${{ matrix.board }}
    needs: resolve-boards
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        board: ${{ fromJSON(needs.resolve-boards.outputs.boards) }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Resolve latest U-Boot version
        id: uboot
        run: |
          if [ -n "${{ inputs.uboot_version }}" ]; then
            ver="${{ inputs.uboot_version }}"
          else
            tag=$(git ls-remote --tags --refs https://github.com/u-boot/u-boot.git \
              | awk -F/ '{print $NF}' \
              | grep -E '^v20[0-9]+\.[0-9]+$' \
              | sort -V | tail -1)
            if [ -z "$tag" ]; then
              echo "ERROR: could not resolve latest U-Boot tag" >&2; exit 1
            fi
            ver="${tag#v}"
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "Resolved U-Boot version: $ver"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bison flex libssl-dev bc python3-dev python3-setuptools device-tree-compiler swig python3-libfdt python3-pyelftools uuid-dev libgnutls28-dev python3-pycryptodome

      - name: Build Bootloader
        run: |
          ./scripts/build-bootloader.sh "${{ matrix.board }}" "${{ steps.uboot.outputs.version }}"

      - name: Upload bootloader artifact
        uses: actions/upload-artifact@v4
        with:
          name: bootloader-${{ matrix.board }}
          path: alpine/bootloader/${{ matrix.board }}/
          if-no-files-found: error

  commit:
    name: Commit and push changes
    needs: [resolve-boards, prebuild]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all bootloader artifacts
        uses: actions/download-artifact@v4
        with:
          path: temp-artifacts

      - name: Copy artifacts and commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for board in $(echo '${{ needs.resolve-boards.outputs.boards }}' | jq -r '.[]'); do
            if [ -d "temp-artifacts/bootloader-${board}" ]; then
              echo "Restoring bootloader for ${board}..."
              rm -rf "alpine/bootloader/${board}"
              mkdir -p "alpine/bootloader/${board}"
              cp -a "temp-artifacts/bootloader-${board}/." "alpine/bootloader/${board}/"
            fi
          done

          if ! git diff --quiet alpine/bootloader/; then
            git add alpine/bootloader/
            git commit -m "bootloaders: rebuild requested boards"
            git push
          else
            echo "No changes to commit for any board"
          fi

      - name: Dispatch image rebuild workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Dispatching image rebuild workflows..."
          gh workflow run alpine.yml || true
          gh workflow run buildroot.yml || true
