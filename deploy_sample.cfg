# Minime Target Disk Configuration File
#
# Copy this file to deploy.cfg in the repository root to specify
# your default SD card device for 'just deploy' and 'just fetch'.
#
# Format: disk_device=/dev/rdiskN (or /dev/diskN)
#
# GUARD: Automatic deployment using deploy.cfg will ONLY proceed if the
# target disk already contains a partition with the volume label "minime".
# To flash a fresh/blank card, explicitly pass the device as an argument:
#   just deploy downloads/image.img /dev/rdisk4

disk_device=/dev/rdisk4
