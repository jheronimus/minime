# Minime core mapping contract.
# Format: folder | core_filename | core_display_name | system_display_name
# folder      : name of the roms/<folder>/ and saves/<folder>/ directories.
# core_filename: name of the libretro core under .cores/ (relative to CORES_PATH).
# core_display_name: name shown for the core in UI settings/menus.
# system_display_name: name shown for the system in the launcher.

gb | gambatte_libretro.so | Gambatte | Game Boy
gbc | gambatte_libretro.so | Gambatte | Game Boy Color
gba | mgba_libretro.so | mGBA | Game Boy Advance
nes | fceumm_libretro.so | FCEUmm | Nintendo Entertainment System
snes | snes9x_libretro.so | Snes9x | Super Nintendo Entertainment System
md | genesis_plus_gx_libretro.so | Genesis Plus GX | Sega Genesis
gg | genesis_plus_gx_libretro.so | Genesis Plus GX | Game Gear
sms | genesis_plus_gx_libretro.so | Genesis Plus GX | Master System
pce | mednafen_pce_fast_libretro.so | Beetle PCE FAST | PC Engine
psx | pcsx_rearmed_libretro.so | PCSX ReARMed | PlayStation
ss | beetle_saturn_libretro.so | Beetle Saturn | Sega Saturn
arc | fbneo_libretro.so | FBNeo | Arcade
