image sp-h700.img {
	hdimage {
	}

	partition u-boot {
		in-partition-table = "no"
		image = "u-boot-sunxi-with-spl.bin"
		offset = 8K
	}

	partition system {
		offset = 4M
		partition-type = 0x83
		bootable = "true"
		image = "system.erofs"
	}

	partition userdata {
		partition-type = 0x0C
		image = "userdata.vfat"
	}
}
