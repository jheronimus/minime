[match]
model=Anbernic RG353V
compatible=anbernic,rg353v

[device]
device_id=rg353v
device_model=Anbernic RG353V
screen_width=640
screen_height=480
screen_rotation=270
wifi_interface=wlan0
bluetooth_adapter=hci0
hdmi_state_path=/sys/class/switch/hdmi/cable.0/state
battery_capacity_path=/sys/class/power_supply/battery
charger_online_path=/sys/class/power_supply/rk817-charger/online
lid_switch_path=na
rumble_path=na
power_led_path=na
axis_lx=2
axis_ly=3
axis_rx=4
axis_ry=5
axis_min=-4096
axis_center=0
axis_max=4096
