image sp-rk3326.img {
	hdimage {
		partition-table-type = "gpt"
	}

	partition idbloader {
		in-partition-table = "no"
		image = "idbloader.img"
		offset = 32K
	}

	partition uboot {
		in-partition-table = "no"
		image = "u-boot.itb"
		offset = 8M
	}

	partition system {
		offset = 16M
		partition-type = 0x83
		bootable = "true"
		image = "system.erofs"
	}

	partition userdata {
		partition-type = 0x0C
		image = "userdata.vfat"
	}
}
