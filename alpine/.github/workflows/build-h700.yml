name: Build Minime (H700)

on:
  workflow_dispatch:
    inputs:
      clean_output:
        description: 'Clean the board output directory before building'
        required: false
        default: false
        type: boolean

jobs:
  build:
    if: false
    name: Build H700 Firmware
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Clean output
        if: ${{ inputs.clean_output }}
        run: |
          echo "Cleaning output for board: h700"
          make clean BOARD=h700

      - name: Verify/Install Dependencies
        run: |
          ./scripts/prepare-linux.sh

      - name: Build Image
        run: |
          echo "Building image for board: h700"
          make image BOARD=h700
